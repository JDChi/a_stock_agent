services:
  api:
    build: .
    environment:
      APP_NAME: ${APP_NAME:-a-stock-agent}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_PATH: ${DATABASE_PATH:-data/a_stock_agent.sqlite3}
      BOOKS_DIR: ${BOOKS_DIR:-books}
      MODELS_DIR: ${MODELS_DIR:-data/models}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-base-zh-v1.5}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-768}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-MiniMax-M2.7-highspeed}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.minimaxi.com/anthropic}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_AUTH_TOKEN: ${LLM_AUTH_TOKEN:-}
      ENABLE_LIVE_AKSHARE: ${ENABLE_LIVE_AKSHARE:-true}
      ENABLE_ADK_WEB_UI: ${ENABLE_ADK_WEB_UI:-false}
      AKSHARE_PROXY_PATCH_ENABLED: ${AKSHARE_PROXY_PATCH_ENABLED:-false}
      AKSHARE_PROXY_PATCH_GATEWAY: ${AKSHARE_PROXY_PATCH_GATEWAY:-101.201.173.125}
      AKSHARE_PROXY_PATCH_TOKEN: ${AKSHARE_PROXY_PATCH_TOKEN:-}
      AKSHARE_PROXY_PATCH_RETRY: ${AKSHARE_PROXY_PATCH_RETRY:-30}
      AKSHARE_PROXY_PATCH_HOOK_URLS: ${AKSHARE_PROXY_PATCH_HOOK_URLS:-https://82.push2.eastmoney.com/api/qt/clist/get,https://push2.eastmoney.com/api/qt/stock/get,https://17.push2.eastmoney.com/api/qt/clist/get,https://push2his.eastmoney.com/api/qt/stock/kline/get,https://push2his.eastmoney.com/api/qt/stock/trends2/get,https://push2.eastmoney.com/api/qt/clist/get,https://push2his.eastmoney.com/api/qt/stock/fflow/daykline/get,http://push2.eastmoney.com/api/qt/clist/get}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./books:/app/books
      - ./models:/app/models
    command: ["uv", "run", "a-stock-agent-api"]

  adk-web:
    build: .
    profiles:
      - dev-ui
    environment:
      APP_NAME: ${APP_NAME:-a-stock-agent}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_PATH: ${DATABASE_PATH:-data/a_stock_agent.sqlite3}
      BOOKS_DIR: ${BOOKS_DIR:-books}
      MODELS_DIR: ${MODELS_DIR:-data/models}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-base-zh-v1.5}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-768}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-MiniMax-M2.7-highspeed}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.minimaxi.com/anthropic}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_AUTH_TOKEN: ${LLM_AUTH_TOKEN:-}
      ENABLE_LIVE_AKSHARE: ${ENABLE_LIVE_AKSHARE:-true}
      ENABLE_ADK_WEB_UI: "true"
      AKSHARE_PROXY_PATCH_ENABLED: ${AKSHARE_PROXY_PATCH_ENABLED:-false}
      AKSHARE_PROXY_PATCH_GATEWAY: ${AKSHARE_PROXY_PATCH_GATEWAY:-101.201.173.125}
      AKSHARE_PROXY_PATCH_TOKEN: ${AKSHARE_PROXY_PATCH_TOKEN:-}
      AKSHARE_PROXY_PATCH_RETRY: ${AKSHARE_PROXY_PATCH_RETRY:-30}
      AKSHARE_PROXY_PATCH_HOOK_URLS: ${AKSHARE_PROXY_PATCH_HOOK_URLS:-https://82.push2.eastmoney.com/api/qt/clist/get,https://push2.eastmoney.com/api/qt/stock/get,https://17.push2.eastmoney.com/api/qt/clist/get,https://push2his.eastmoney.com/api/qt/stock/kline/get,https://push2his.eastmoney.com/api/qt/stock/trends2/get,https://push2.eastmoney.com/api/qt/clist/get,https://push2his.eastmoney.com/api/qt/stock/fflow/daykline/get,http://push2.eastmoney.com/api/qt/clist/get}
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
      - ./books:/app/books
      - ./models:/app/models
    command: ["uv", "run", "adk", "web", "src/a_stock_agent/adk_app", "--host", "0.0.0.0", "--port", "8000"]
